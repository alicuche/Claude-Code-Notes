<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Context AI — Cheatsheet</title>
  <link rel="stylesheet" href="shared/styles.css">
  <style>
    .cheatsheet-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      margin: 16px 0;
    }
    .cheatsheet-frame {
      background: rgba(255,255,255,0.9);
      border: 1px solid var(--purple-border);
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 4px 16px rgba(124,58,237,0.06);
      width: 100%;
      max-width: 960px;
      overflow: auto;
      max-height: calc(100vh - 260px);
    }
    .cheatsheet-frame img {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 6px;
    }
    .cheatsheet-actions {
      display: flex;
      gap: 12px;
      align-items: center;
    }
    .cheatsheet-actions a {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      text-decoration: none;
      transition: all var(--transition-fast);
      cursor: pointer;
    }
    .btn-primary {
      background: var(--purple);
      color: white;
    }
    .btn-primary:hover {
      background: #6D28D9;
      box-shadow: 0 2px 8px rgba(124,58,237,0.25);
    }
    .btn-secondary {
      background: var(--purple-light);
      color: var(--purple);
      border: 1px solid var(--purple-border);
    }
    .btn-secondary:hover {
      background: rgba(124,58,237,0.12);
    }
    .cheatsheet-note {
      font-size: 12px;
      color: var(--text-faint);
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="presentation-layout">
    <aside class="sidebar" role="navigation" aria-label="Slide navigation"></aside>
    <header class="header" role="banner"></header>
    <main class="content" role="main">
      <div class="slide-container">
        <h1 class="slide-title animate-in">Cheatsheet</h1>
        <p class="slide-subtitle animate-in" style="margin-bottom: 16px;">Claude Code quick-reference card</p>

        <div class="cheatsheet-wrapper animate-in">
          <div class="cheatsheet-frame">
            <img src="../claude-code-cheatsheet.svg" alt="Claude Code Cheatsheet — configuration, CLAUDE.md, slash commands, key file locations, models">
          </div>

          <div class="cheatsheet-actions">
            <a class="btn-primary" href="../claude-code-cheatsheet.svg" target="_blank">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 2v8m0 0L5 7m3 3l3-3M3 13h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
              Open Full SVG
            </a>
            <a class="btn-secondary" href="../claude-code-cheatsheet.svg" download="claude-code-cheatsheet.svg">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 2v8m0 0L5 7m3 3l3-3M3 13h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
              Download
            </a>
          </div>

          <p class="cheatsheet-note">SVG scales to any resolution &mdash; ideal for printing or embedding in docs</p>
        </div>
      </div>
    </main>
    <footer class="footer" role="contentinfo"></footer>
  </div>
  <script src="shared/navigation.js"></script>
</body>
</html>
