<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Context AI — Title</title>
  <link rel="stylesheet" href="shared/styles.css">
  <style>
    .title-hero {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: calc(100vh - var(--header-height) - var(--footer-height) - 80px);
      text-align: center;
    }
    .title-hero .slide-title {
      font-size: 56px;
      letter-spacing: -0.03em;
      margin-bottom: 16px;
    }
    .title-hero .slide-subtitle {
      font-size: 22px;
      color: var(--text-muted);
      max-width: 600px;
    }
    .title-meta {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin-top: 40px;
      max-width: 680px;
    }
    .title-meta .tag {
      font-size: 12px;
      padding: 5px 14px;
    }
    .title-note {
      margin-top: 48px;
      padding: 16px 24px;
      background: rgba(255,255,255,0.8);
      border: 1px solid var(--border-light);
      border-radius: 8px;
      max-width: 520px;
      text-align: left;
    }
    .title-note p {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="presentation-layout">
    <aside class="sidebar" role="navigation" aria-label="Slide navigation"></aside>
    <header class="header" role="banner"></header>
    <main class="content" role="main">
      <div class="slide-container">
        <div class="title-hero">
          <h1 class="slide-title animate-in">CLAUDE - CONTEXT</h1>
          <div class="title-meta animate-in">
            <span class="tag">Context Engineering</span>
            <span class="tag">Tool Use</span>
            <span class="tag">MCP</span>
            <span class="tag">Skills</span>
            <span class="tag">Agents</span>
            <span class="tag">Tokens</span>
            <span class="tag">Snowball Effect</span>
            <span class="tag">Prompt Caching</span>
            <span class="tag">Compact Lifecycle</span>
            <span class="tag">CLAUDE.md</span>
            <span class="tag">SubAgent</span>
            <span class="tag">Deferred Loading</span>
            <span class="tag">Skill Finder</span>
            <span class="tag">Context Window</span>
            <span class="tag">Cost Optimization</span>
          </div>
        </div>
      </div>
    </main>
    <footer class="footer" role="contentinfo"></footer>
  </div>
  <script src="shared/navigation.js"></script>
</body>
</html>
